<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: #ffffff;
    }
    .card {
      padding: 32px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.2);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    p {
      margin: 0;
      font-size: 16px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello, Cursor!</h1>
    <p>这是一个简单的 HTML 测试页面。</p>
  </main>
</body>
</html>
